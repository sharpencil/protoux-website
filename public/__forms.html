<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Forms</title>
</head>
<body>
    <!-- Hidden form for Netlify detection -->
    <form name="start-form" netlify hidden>
        <input type="hidden" name="form-name" value="start-form" />
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="text" name="org" />
        <select name="model">
            <option value="project">Project-Based Engagement</option>
            <option value="fractional">Fractional Design Partnership</option>
            <option value="other">Other / Custom</option>
        </select>
        <textarea name="challenge"></textarea>
        <input type="text" name="timeline" />
    </form>
</body>
</html>
